version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: ems-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - ems-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ems-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/employee-management
      - JWT_SECRET=production_secret_key_needs_to_be_long_and_secure_minimum_32_characters
      - JWT_EXPIRES_IN=1h
      - CLIENT_URL=http://localhost:3000
    volumes:
      - server-uploads:/usr/src/app/uploads
    depends_on:
      - mongodb
    networks:
      - ems-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ems-client
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - server
    networks:
      - ems-network

volumes:
  mongo-data:
  server-uploads:

networks:
  ems-network:
    driver: bridge
